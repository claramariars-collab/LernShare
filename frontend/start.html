<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LernShare</title>

<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f7fb;
}

header {
    background:#0B1F3A;
    color:white;
    padding:30px;
    text-align:center;
}

h1 {
    font-size:40px;
}

.button {
    background:#123B70;
    color:white;
    padding:15px;
    border-radius:10px;
    display:inline-block;
    margin:10px;
}

.box {
    background:white;
    margin:25px;
    padding:20px;
    border-radius:15px;
}

</style>

</head>


<body>


<header>

<h1>📚 LernShare</h1>

<p>
Gemeinsam lernen. Wissen teilen.
</p>

<div class="button">
Registrieren
</div>

<div class="button">
Anmelden
</div>

</header>


<div class="box">

<h2>🌍 Lernforum</h2>

<p>
Teile deine Lernzettel mit anderen Schülern
und finde die besten Zusammenfassungen.
</p>

</div>


<div class="box">

<h2>📂 Mein Lernbereich</h2>

<p>
Deine privaten Ordner für deine Lernzettel.
</p>

</div>


<div class="box">

<h2>🔎 Suche</h2>

<p>
Finde Lernzettel nach Fach, Klasse und Thema.
</p>

</div>


</body>

</html>
